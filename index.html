    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top left, #020617, #0f172a, #020617);
        color: #f8fafc;
        min-height: 100vh;
        margin: 0;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
      
      @keyframes snip-left {
        0%, 100% { transform: rotate(-20deg) scale(1); }
        50% { transform: rotate(-45deg) scale(1.1); }
      }
      @keyframes snip-right {
        0%, 100% { transform: rotate(200deg) scale(1); }
        50% { transform: rotate(225deg) scale(1.1); }
      }
      .animate-scissors-left { animation: snip-left 1.5s ease-in-out infinite; }
      .animate-scissors-right { animation: snip-right 1.5s ease-in-out infinite; }
      
      .glass-card {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
